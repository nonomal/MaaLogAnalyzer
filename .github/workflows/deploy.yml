name: 部署到 Server

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.repository_owner == 'MaaXYZ' && github.event.head_commit.author.email != '41898282+github-actions[bot]@users.noreply.github.com' }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false

      - name: 安装依赖
        run: pnpm install

      - name: 更新版本号
        run: |
          ver=$(git describe --tags --long --match "v*" 2>/dev/null || echo "v0.0.1-0-g$(git rev-parse --short HEAD)")
          ver=${ver#v}
          echo "Setting version to ${ver}"
          npm pkg set version=${ver}

      - name: 构建
        run: pnpm run build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USERNAME }}
          TARGET: ${{ secrets.DEPLOY_PATH }}
          SOURCE: dist
          # ARGS: -avzr --delete
